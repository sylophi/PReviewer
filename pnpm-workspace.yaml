# Project-local pnpm settings.
#
# nodeLinker: hoisted is required by electron-forge so it can crawl a
# flat node_modules tree when packaging.
#
# blockExoticSubdeps: false is a project-scoped allowance for the
# @electron/node-gyp transitive dep (git+https://github.com/electron/node-gyp.git,
# pinned SHA, used by @electron/rebuild during native-module builds).
# Your other guards still apply: minimumReleaseAge: 10080 (7 days),
# ignoreScripts: true, strictDepBuilds: true.
nodeLinker: hoisted
blockExoticSubdeps: false
# Per-package build-script trust. pnpm 11 uses this map to gate which
# dependencies are allowed to run install scripts.
allowBuilds:
  electron: true
  esbuild: true
  lefthook: true
  electron-winstaller: false
  fs-xattr: false
  macos-alias: false
# Force tar >= 7.5.10 to patch CVE-2026-29786 (GHSA-qffp-2rhf-9h96):
# hardlink path traversal via drive-relative linkpath. Pulled in transitively
# through @electron/rebuild -> @electron/node-gyp. No 6.x backport exists.
#
# Force tmp >= 0.2.6 to patch CVE-2026-44705 (GHSA-ph9p-34f9-6g65) and
# CVE-2025-54798 (GHSA-52f5-9888-hmc6). Pulled in transitively through
# @electron-forge/cli -> @inquirer/prompts -> external-editor.
overrides:
  "tar@<7.5.10": "^7.5.10"
  "tmp@<0.2.6": "0.2.6"
minimumReleaseAgeExclude:
  - tmp
