<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PReview</title>
    <script>
      // Apply persisted theme synchronously before any CSS or React runs, so
      // the first paint matches the user's choice. The window itself is
      // transparent (vibrancy: "sidebar" in main/index.ts); the opaque
      // background is painted by the main content area only.
      (function () {
        try {
          var stored = localStorage.getItem("preview.theme") || "system";
          var dark =
            stored === "dark" ||
            (stored === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var html = document.documentElement;
          if (dark) html.classList.add("dark");
          html.style.colorScheme = dark ? "dark" : "light";
        } catch (_) {
          // localStorage may be unavailable in some contexts; render light.
        }
      })();
    </script>
    <script type="module">
      // react-grab: ⌘C / Ctrl+C on a hovered element copies its source
      // location (file + component) for pasting into an AI coding agent.
      // Dev-only — Vite tree-shakes this out of packaged builds.
      if (import.meta.env.DEV) {
        import("react-grab");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/renderer/index.tsx"></script>
  </body>
</html>
